[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # atomic-polyfill: transitive dep via postcard -> heapless, no upgrade available
    "RUSTSEC-2023-0089",
    # rustls-pemfile: unmaintained, migration to rustls-pki-types planned
    "RUSTSEC-2025-0134",
    # rsa: transitive via sigstore (cosign keyless verification). The Marvin
    # timing sidechannel affects RSA private-key operations; pgbattery only
    # verifies ECDSA cosign signatures and performs no RSA private-key ops, so
    # it is not reachable here. No patched rsa release exists.
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "AGPL-3.0-only",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
