    {
      "id": "rewind-refused-on-data-loss-risk",
      "tests_md_ref": "Rewind data-loss gate — supervisor refuses pg_rewind when local WAL is more than one block ahead of the source",
      "description": "Regression coverage for the pre-rewind divergence check. pg_rewind aligns local data to the source by discarding any WAL the source doesn't have; if the local node had ack'd commits beyond the source LSN (e.g. an ex-leader rejoining after the cluster promoted a follower that didn't see all writes), the rewind silently erases those commits. The supervisor now queries both LSNs before invoking pg_rewind and refuses with `Error::RewindDataLossRisk` when divergence exceeds `PG_REWIND_DIVERGENCE_THRESHOLD_BYTES` (8 KiB). This case verifies: (1) the metric `pgbattery_pg_rewind_refused_data_loss_risk` is exposed, (2) a healthy leader transfer + rejoin sequence does NOT spuriously trigger the gate (false-positive regression). The positive case (gate actually fires) requires fault injection beyond the standard chaos toolkit and is covered by the supervisor's unit tests (`test_rewind_decision_refuse_beyond_threshold`, etc).",
      "actions": [
        {
          "type": "cmd",
          "comment": "Confirm the gate metric is described and exposed on the current leader. /metrics returns HELP + value lines for described counters even when their value is 0.",
          "cmd": "LEADER=$(curl -s http://localhost:9081/api/v1/cluster/leader | grep -oE '\"leader_id\":[0-9]+' | cut -d: -f2); LEADER_PORT=$((9090 + LEADER)); BODY=$(curl -s http://localhost:$LEADER_PORT/metrics); echo \"$BODY\" | grep -E '^# HELP pgbattery_pg_rewind_refused_data_loss_risk' || (echo 'metric HELP missing'; exit 1)"
        },
        {
          "type": "record_leader",
          "var": "rewind_test_initial_leader"
        },
        {
          "type": "transfer_leadership",
          "target_node_id": 2
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "leader_not_var": "rewind_test_initial_leader",
          "timeout_sec": 60,
          "comment": "Graceful transfer — every node catches up before transfer, so no divergence beyond the in-flight one-WAL-block tolerance. The old leader rewinds (if needed) without tripping the gate."
        },
        {
          "type": "transfer_leadership",
          "target_node_id": 1
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "leader_equals": 1,
          "timeout_sec": 60
        }
      ],
      "assertions": [
        {
          "type": "cluster_topology",
          "nodes": 3,
          "leaders": 1
        },
        {
          "type": "cmd",
          "comment": "False-positive regression: after a fully-graceful transfer cascade with all nodes caught up, the rewind data-loss gate must NOT have fired on any node. A non-zero counter here means the gate triggered during a scenario it should have allowed — false positive that would deadlock failover.",
          "cmd": "for p in 9091 9092 9093; do COUNT=$(curl -s http://localhost:$p/metrics | awk '/^pgbattery_pg_rewind_refused_data_loss_risk/{print $2}' | head -1); COUNT=${COUNT:-0}; echo \"port $p: $COUNT\"; [ \"$(echo \"$COUNT\" | cut -d. -f1)\" -eq 0 ] || (echo \"FALSE POSITIVE: rewind gate fired on port $p (count=$COUNT)\"; exit 1); done"
        }
      ]
    },
    {
      "id": "stale-sync-metric-after-kill",
      "tests_md_ref": "BUGS.md: pgbattery_replica_is_sync stale-Sync after replica disconnect",
      "description": "After killing a follower's PostgreSQL, the leader's per-replica sync gauge must NOT keep reporting two Sync replicas. PG drops the walsender from pg_stat_replication within ~1s; the gauge must mirror that source-of-truth and not linger on the cached Sync value for `disconnect_timeout`. Pre-fix, replication_manager only flipped sync_state=Async after the grace window; post-fix, it flips immediately on absence from pg_stat_replication.",
      "actions": [
        {
          "type": "record_leader",
          "var": "leader_for_sync_metric"
        },
        {
          "type": "cmd",
          "comment": "Wait for sync replication to be established (at least one Sync replica) before introducing chaos. Otherwise we'd be asserting on bootstrap state, not steady state.",
          "cmd": "LEADER=$(curl -s http://localhost:9081/api/v1/cluster/leader | grep -oE '\"leader_id\":[0-9]+' | cut -d: -f2); LEADER_PORT=$((9090 + LEADER)); for i in $(seq 1 30); do SYNC=$(curl -s http://localhost:$LEADER_PORT/metrics | awk '/^pgbattery_replica_is_sync\\{/{if($2>=1.5)c++} END{print c+0}'); if [ \"$SYNC\" -ge 1 ]; then echo \"sync replicas: $SYNC\"; break; fi; sleep 1; done; [ \"$SYNC\" -ge 1 ]"
        },
        {
          "type": "cmd",
          "comment": "Kill PG (not pgbattery) on a follower. PG drops the walsender; the leader's pg_stat_replication loses that row within ~1s.",
          "cmd": "LEADER=$(curl -s http://localhost:9081/api/v1/cluster/leader | grep -oE '\"leader_id\":[0-9]+' | cut -d: -f2); TARGET=$([ \"$LEADER\" = 1 ] && echo node2 || echo node1); echo \"killing PG on $TARGET (leader=$LEADER)\"; docker compose exec -T $TARGET bash -c 'pkill -9 -f \"^/usr/lib/postgresql/.*/postgres -D\" || true'"
        },
        {
          "type": "sleep",
          "seconds": 2,
          "comment": "Give the leader's replica_check tick (1s interval) one full pass to scrape pg_stat_replication and re-emit metrics. Pre-fix: stale Sync persists for ~disconnect_timeout (~15s). Post-fix: flips to Async on the very next tick."
        },
        {
          "type": "cmd",
          "comment": "Assert: leader's pgbattery_replica_is_sync gauge reports AT MOST 1 sync replica (only the surviving follower). Pre-fix sees 2; post-fix sees 1. Exits non-zero on stale-Sync detection.",
          "cmd": "LEADER=$(curl -s http://localhost:9081/api/v1/cluster/leader | grep -oE '\"leader_id\":[0-9]+' | cut -d: -f2); LEADER_PORT=$((9090 + LEADER)); BODY=$(curl -s http://localhost:$LEADER_PORT/metrics); SYNC=$(echo \"$BODY\" | awk '/^pgbattery_replica_is_sync\\{/{if($2>=1.5)c++} END{print c+0}'); echo \"leader=$LEADER sync_count=$SYNC\"; echo \"$BODY\" | grep -E '^pgbattery_replica_is_sync' || true; [ \"$SYNC\" -le 1 ]"
        }
      ],
      "assertions": [
        {
          "type": "leader_equals_var",
          "var": "leader_for_sync_metric",
          "comment": "Killing a follower's PG must not cause leadership change."
        }
      ],
      "cleanup": [
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 120,
          "comment": "Docker restart policy + pgbattery process-death detection brings the killed node back; wait for full reconvergence so the next case starts clean."
        }
      ]
    }
  ]
