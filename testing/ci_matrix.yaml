    {
      "id": "lsn-leaderless-livelock-recovery",
      "tests_md_ref": "Audit C3/Liveness: LSN fail-closed leaderless livelock",
      "description": "Regression coverage for the LSN-fail-closed leaderless livelock. `max_cluster_lsn` is refreshed only by Raft applies; during a leaderless window exceeding LSN_STALENESS_THRESHOLD_SECS (30s), the cached value stayed non-zero while all stored LSN timestamps aged into staleness. Pre-fix, every voter saw every candidate as stale and refused every vote → election livelock. Post-fix, is_lsn_acceptable_for_election re-derives the fresh max on the fly from node_lsns and falls back to bootstrap-permissive when nothing is fresh. Scenario: kill node1 (leader by default), wait long enough that all surviving nodes' last-seen LSN updates from the dead leader have aged out (45s = staleness + margin), then verify the surviving voters elect a new leader.",
      "actions": [
        {
          "type": "record_leader",
          "var": "leader_before_livelock"
        },
        {
          "type": "cmd",
          "comment": "kill the current leader's container so the cluster goes leaderless. Docker restart kicks in but with the staleness window > restart cooldown we still spend long enough leaderless to trip the bug.",
          "cmd": "LEADER=$(curl -s http://localhost:9081/api/v1/cluster/leader | grep -oE '\"leader_id\":[0-9]+' | cut -d: -f2); TARGET=node${LEADER}; echo \"killing $TARGET (leader=$LEADER)\"; docker compose kill $TARGET"
        },
        {
          "type": "sleep",
          "seconds": 45,
          "comment": "Wait long enough that any LSN heartbeats from the dead leader present in node_lsns have aged past LSN_STALENESS_THRESHOLD_SECS=30s. Pre-fix the survivors would be wedged on votes during this window; post-fix they fall back to bootstrap-permissive."
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "live_nodes": 2,
          "leaders": 1,
          "leader_not_var": "leader_before_livelock",
          "timeout_sec": 90,
          "comment": "Must converge to a single new leader. Pre-fix this times out (every voter rejects every candidate as stale)."
        }
      ],
      "assertions": [
        {
          "type": "leader_not",
          "var": "leader_before_livelock"
        },
        {
          "type": "metric_leader_count",
          "expected": 1
        }
      ],
      "cleanup": [
        {
          "type": "cmd",
          "cmd": "docker compose start $(docker compose ps -a --services --filter status=exited) 2>/dev/null || true",
          "expect_exit": null
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 120
        }
      ]
