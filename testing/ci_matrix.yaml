      "id": "leader-network-partition-real",
      "tests_md_ref": "Control Plane 11. Real Network Partition (docker network disconnect) [V1]",
      "description": "Severs node1 from the overlay network (not a process pause) and verifies fencing and election. Unlike SIGSTOP, the node cannot communicate with peers at all \u2014 tests the true split-brain path.",
      "actions": [
        {
          "type": "transfer_leadership",
          "target_node_id": 1
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 60
        },
        {
          "type": "record_leader",
          "var": "leader_before"
        },
        {
          "type": "cmd",
          "comment": "disconnect node1 from the raft overlay \u2014 process stays alive but cannot reach peers",
          "cmd": "docker network disconnect \"${COMPOSE_PROJECT_NAME:-pgbattery}_raft_net\" \"${COMPOSE_PROJECT_NAME:-pgbattery}-node1-1\""
        },
        {
          "type": "wait_cluster",
          "comment": "node1 is severed from the overlay network, so only 2 nodes are live. Declare live_nodes=2 so the convergence oracle allows node1's leader-view to be absent and expects a single replica; without it the check waits forever for the partitioned node's view and a 2nd healthy replica.",
          "nodes": 3,
          "live_nodes": 2,
          "leaders": 1,
          "leader_not_var": "leader_before",
          "timeout_sec": 60
        },
        {
          "type": "cmd",
          "comment": "restore connectivity so node1 can rejoin as follower",
          "cmd": "docker network connect \"${COMPOSE_PROJECT_NAME:-pgbattery}_raft_net\" \"${COMPOSE_PROJECT_NAME:-pgbattery}-node1-1\""
        },
        {
          "type": "cmd",
          "comment": "Restart node1 container so docker host->container port forwarding for 9081/9091 is re-established. Without this restart, network disconnect/connect leaves the published-port iptables/userland-proxy state stale on macOS Docker and host-side requests to localhost:9081 and localhost:9091 time out, even though the container can reach peers fine.",
          "cmd": "docker compose restart node1"
        },
        {
          "type": "wait_cluster",
          "comment": "Demand full replication health (2 healthy followers) before yielding to the next case, otherwise its first transfer can hit the catch-up gate on a still-booting node1.",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 120,
          "min_healthy_replicas": 2
        },
        {
          "type": "sleep",
          "comment": "After partition heal, openraft 0.9 keeps replication-to-rejoined-node on a backoff for several seconds before sending heartbeats reliably. Without this settling window, the next test's leadership transfer can land while node1's RaftMetrics::replication[1].matched is still None and the cluster trips the catch-up gate.",
          "seconds": 5
        }
      ],
      "assertions": [
        {
          "type": "cluster_topology",
          "nodes": 3,
          "leaders": 1
        },
        {
          "type": "metric_leader_count",
          "expected": 1
        }
      ]
    },
