          "type": "cmd",
          "cmd": "if [ \"$(echo '{{max_prepared_transactions}}' | tr -d '[:space:]')\" = '0' ]; then echo 'prepared transactions disabled; skipping active 2PC path'; else docker compose exec -T node1 sh -lc \"psql -U postgres -h localhost -p 5432 -d postgres -v ON_ERROR_STOP=1 -c \\\"BEGIN; INSERT INTO ci_prepared_xact(id) VALUES (1) ON CONFLICT DO NOTHING; PREPARE TRANSACTION 'ci_xact_1';\\\"\"; fi"
