      "id": "double-failover-partition",
      "tests_md_ref": "Control Plane 19. Double Failover with Network Partition [V1]",
      "description": "Kill leader, let it rejoin, then pause the NEW leader. Verifies that after two rapid timeline changes every follower pg_rewinds correctly, resumes streaming, and joins the sync standby list. This is the exact sequence that previously left followers wedged with stale min_recovery_end_timeline.",
      "actions": [
        {
          "type": "transfer_leadership",
          "target_node_id": 1
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 60
        },
        {
          "type": "cmd",
          "comment": "Kill leader node1 — triggers first failover (TL N+1)",
          "cmd": "docker compose kill node1"
        },
        {
          "type": "wait_cluster",
          "nodes": 2,
          "leaders": 1,
          "timeout_sec": 30
        },
        {
          "type": "record_leader",
          "var": "second_leader"
        },
        {
          "type": "cmd",
          "comment": "Bring node1 back so it can rejoin as follower",
          "cmd": "docker compose start node1"
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 60
        },
        {
          "type": "sql",
          "comment": "Write data while all three nodes are up",
          "file": "double-failover-setup.sql",
          "node": "leader"
        },
        {
          "type": "cmd",
          "comment": "Pause the current leader — triggers second failover (TL N+2)",
          "cmd": "docker pause pgbattery-node{{ second_leader }}-1"
        },
        {
          "type": "sleep",
          "seconds": 8
        },
        {
          "type": "cmd",
          "comment": "Unpause the old leader — it must pg_rewind and rejoin",
          "cmd": "docker unpause pgbattery-node{{ second_leader }}-1"
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 90
        },
        {
          "type": "sleep",
          "comment": "Give replication manager time to converge sync standby list",
          "seconds": 10
        }
      ],
      "assertions": [
        {
          "type": "cluster_topology",
          "nodes": 3,
          "leaders": 1
        },
        {
          "type": "cmd",
          "comment": "Verify ALL followers are streaming (not stuck in startup/waiting). Run on every node — the current leader has pg_stat_replication.",
          "cmd": "for n in node1 node2 node3; do cnt=$(docker compose exec -T $n psql -h 127.0.0.1 -p 5434 -U postgres -tAc \"SELECT count(*) FROM pg_stat_replication WHERE state = 'streaming';\" 2>/dev/null | tr -d ' '); [ \"$cnt\" = \"2\" ] && exit 0; done; exit 1"
        },
        {
          "type": "cmd",
          "comment": "Verify sync_standby_names includes both followers (query the leader)",
          "cmd": "for n in node1 node2 node3; do ssn=$(docker compose exec -T $n psql -h 127.0.0.1 -p 5434 -U postgres -tAc 'SHOW synchronous_standby_names;' 2>/dev/null); echo \"$ssn\" | grep -q 'pgbattery_node_' && echo \"$ssn\" | grep -c 'pgbattery_node_' | grep -q '[2-3]' && exit 0; done; exit 1"
        },
        {
          "type": "sql",
          "comment": "Verify writes succeed (not blocked by missing sync replica)",
          "file": "double-failover-assert.sql",
          "node": "leader"
        }
      ],
      "cleanup": [
        {
          "type": "cmd",
          "comment": "Ensure all containers running (unpause any stuck paused)",
          "cmd": "docker unpause pgbattery-node1-1 pgbattery-node2-1 pgbattery-node3-1 2>/dev/null || true",
