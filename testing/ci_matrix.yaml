    {
      "id": "vote-rejection-progresses",
      "tests_md_ref": "Audit C3: Vote rejection returns proper VoteResponse, not transport error",
      "description": "Regression coverage for the vote-rejection-as-Protocol-error bug. The LSN-gate in network.rs used to return Err(Protocol) when rejecting a vote; openraft callers treated that as a transport error and retried forever, while the rejecting side had committed to a no. Post-fix, a rejection emits a proper VoteResponse{vote_granted=false} and the candidate can step down / let another node win. This test rapidly cycles leadership several times: under the pre-fix bug, any LSN-gate rejection would deadlock the cycle. Under the post-fix code, even if some votes are rejected, the cluster keeps making progress.",
