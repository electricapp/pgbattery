          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 120
        },
        {
          "type": "cmd",
          "cmd": "docker compose exec -T node1 pkill -9 pgbattery"
        },
        {
          "type": "wait_cluster",
          "nodes": 3,
          "leaders": 1,
          "timeout_sec": 120
        },
        {
          "type": "cmd",
          "cmd": "if [ \"$(echo '{{max_prepared_transactions}}' | tr -d '[:space:]')\" = '0' ]; then echo 'prepared transactions disabled; skipping COMMIT PREPARED'; else docker compose exec -T node2 sh -lc \"psql -U postgres -h localhost -p 5432 -d postgres -v ON_ERROR_STOP=1 -c \\\"COMMIT PREPARED 'ci_xact_1';\\\"\"; fi"
        }
      ],
      "assertions": [
        {
          "type": "cmd",
          "cmd": "if [ \"$(echo '{{max_prepared_transactions}}' | tr -d '[:space:]')\" = '0' ]; then echo 'prepared transactions disabled; semantics check skipped'; exit 0; fi; docker compose exec -T node2 sh -lc \"psql -U postgres -h localhost -p 5432 -d postgres -tAc 'SELECT COUNT(*) FROM ci_prepared_xact WHERE id = 1;' | tr -d '[:space:]' | grep -x '1'\""
        }
      ]
