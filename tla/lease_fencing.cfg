SPECIFICATION Spec

\* LeaseDuration : QuorumTimeout = 2s : 1s, matching
\* DEFAULT_LEASE_DURATION and QUORUM_TIMEOUT_MS. HoldDown == LeaseDuration
\* (the code waits one full lease duration). MaxTime/MaxTerm bound the state
\* space; raise them for deeper coverage or lower them if TLC runs long.
CONSTANTS
    Nodes = {1, 2, 3}
    LeaseDuration = 20
    QuorumTimeout = 10
    HoldDown = 20
    MaxTerm = 3
    MaxTime = 40

CONSTRAINT StateConstraint

INVARIANTS
    TypeOK
    AtMostOneWriteAuthority
    SelfFenceOnQuorumLoss
    WritableImpliesLeaseLeader

\* NON-VACUITY CHECK: set HoldDown = 0 (or any value < LeaseDuration) and re-run.
\* TLC must then report an AtMostOneWriteAuthority violation: the deposed leader
\* still holds write authority when the new leader promotes (split-brain). If it
\* does NOT, the model has regressed into vacuity.
