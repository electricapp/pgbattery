SPECIFICATION Spec

\* The safety proof depends on the RATIOS, not the absolute values:
\*   QuorumTimeout < LeaseDuration <= HoldDown   (the code: 1s < 2s, HoldDown = 2s).
\* Small tick counts keep the state space tiny; every variable is bounded by one
\* of these constants, and there is no global clock, so no MaxTime is needed.
CONSTANTS
    Nodes = {1, 2, 3}
    QuorumTimeout = 2
    LeaseDuration = 4
    HoldDown = 4
    MaxTerm = 3

INVARIANTS
    TypeOK
    AtMostOneWriteAuthority
    SelfFenceOnQuorumLoss
    WritableImpliesLeaseLeader

\* NON-VACUITY: the model genuinely reaches two-leader states, so the invariant
\* is not trivially true. To watch it FAIL, remove `ASSUME HoldDown >= LeaseDuration`
\* from the spec (the assumption rejects HoldDown < LeaseDuration before checking),
\* then set HoldDown = 0 here and re-run: TLC reports an AtMostOneWriteAuthority
\* violation — the deposed leader still has write authority when the new leader
\* promotes (split-brain).
