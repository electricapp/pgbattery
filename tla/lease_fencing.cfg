SPECIFICATION Spec

CONSTANTS
    Nodes = {1, 2, 3}
    LeaseDuration = 20
    QuorumTimeout = 10
    EnforcementInterval = 1
    MaxTime = 50

CONSTRAINT StateConstraint

INVARIANTS
    AtMostOneWritableNode
    NoWritesWithoutLease
    PartitionedNodeLeaseMustExpire
    LeaseExpiresAfterPartition
    NoSplitBrain
    \* GatewayLeaseInSync - Not an invariant; was original post-condition constraint
