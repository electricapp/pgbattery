SPECIFICATION Spec

CONSTANTS
    Nodes = {1, 2, 3}
    MaxTimeline = 3

CONSTRAINT StateConstraint

\* Timelines stay within bounds. Holds because the promotion actions guard on
\* timelineID < MaxTimeline, so TLC never reaches an out-of-bounds state.
INVARIANT TypeOK

\* A node's timeline never decreases — promotions only ever advance it.
PROPERTY TimelineMonotonic

\* NoDualPrimariesSameTimeline is intentionally NOT checked: it is FALSE in the
\* partition model (two forks can share a timeline number). Single-primary
\* safety lives in lease_fencing.tla (Raft); the pg_rewind data-loss gate is
\* covered by the Rust unit tests for rewind_divergence_decision.
