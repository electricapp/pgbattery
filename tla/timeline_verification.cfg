SPECIFICATION Spec

CONSTANTS
    Nodes = {1, 2, 3}
    MaxTimeline = 3

CONSTRAINT StateConstraint

INVARIANTS
    \* NoDualPrimariesSameTimeline - Too strict for partition model
    \* In a partition, two nodes CAN have same timeline number (different forks)
    \* PromotionBlockedWhenDiverged - Removed: implementation doesn't block (relies on pg_rewind)
    \* NoPrimaryWithStaleTimeline - Removed: after pg_rewind, local timeline < receiver timeline is expected
    \* TypeOK - Removed: StateConstraint handles bounds; TypeOK fails before constraint prunes
