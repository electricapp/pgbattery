\* TLC Model Configuration for raft_lsn.tla
\*
\* Run with: tlc raft_lsn.tla -config raft_lsn.cfg
\*
\* Recommended: Start with small values, increase if no bugs found

\* ============================================================================
\* CONSTANTS
\* ============================================================================

\* 3-node cluster (minimum for meaningful consensus)
CONSTANT Nodes = {1, 2, 3}

\* Bound terms to limit state space (3 terms is enough to catch most bugs)
CONSTANT MaxTerm = 3

\* Bound LSN values (0, 1, 2 represents "none", "some", "more")
\* This abstraction is sufficient - we care about relative ordering
CONSTANT MaxLSN = 2

\* LSN lag threshold
\* Value of 1 means candidate must be within 1 of max known LSN
\* This is the abstracted version of the 16MB threshold
CONSTANT LSNLagThreshold = 1

\* ============================================================================
\* SPECIFICATION
\* ============================================================================

SPECIFICATION Spec

\* ============================================================================
\* INVARIANTS (Safety Properties)
\* ============================================================================

\* Type safety - all variables have correct types
INVARIANT TypeOK

\* Standard Raft: at most one leader per term
INVARIANT ElectionSafety

\* THE KEY PROPERTY: No LSN-caused election deadlock
\* Verifies that LSN constraints don't prevent all elections
INVARIANT NoLSNDeadlock

\* Equivalent positive statement: some node can always eventually win
INVARIANT SomeNodeCanWin

\* ============================================================================
\* PROPERTIES (Liveness - requires fairness)
\* ============================================================================

\* Note: To check liveness, use FairSpec instead of Spec
\* Uncomment the following and run with -deadlock flag:
\*
\* SPECIFICATION FairSpec
\* PROPERTY EventuallyLeader

\* ============================================================================
\* STATE CONSTRAINT (Optional - limits state space)
\* ============================================================================

CONSTRAINT StateConstraint
