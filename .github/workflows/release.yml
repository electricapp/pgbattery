name: Release

# On a `vX.Y.Z` tag, build the binary matrix, sign each artifact with Sigstore
# **cosign keyless** (GitHub Actions OIDC → Fulcio short-lived cert; no signing
# secret to manage), and upload binary + .sha256 + .sig + .pem to the GitHub
# release. `pgbattery upgrade` verifies the .sig/.pem against the expected OIDC
# issuer + release-workflow identity (see src/commands/upgrade/cosign.rs and
# docs/RELEASING.md).

on:
  push:
    tags:
      - 'v*'

# Deny-all by default; each job re-grants only the scopes it needs. The release
# jobs need `contents: write` to create the release and upload assets via gh,
# and the build job additionally needs `id-token: write` for cosign keyless
# (Sigstore OIDC) signing.
permissions: {}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create or reuse the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          # `latest` marker consumed by `pgbattery upgrade` (GET <base>/latest).
          printf '%s\n' "$VERSION" > latest
          gh release upload "$GITHUB_REF_NAME" latest --clobber

  build:
    name: Build & sign (${{ matrix.os_name }}-${{ matrix.arch }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write # upload release assets via gh
      id-token: write # cosign keyless: request the GitHub Actions OIDC token
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x86_64
          - runner: macos-13
            target: x86_64-apple-darwin
            os_name: macos
            arch: x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            os_name: macos
            arch: aarch64
          # TODO: aarch64-unknown-linux-gnu needs a cross toolchain (cross/zig).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.96"
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin pgbattery --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/pgbattery" \
             "dist/pgbattery-${{ matrix.os_name }}-${{ matrix.arch }}"

      # Install cosign by direct download (SHA-pinned + checksum-verified), not
      # an action, so the toolchain is reproducible and audit-pinned. Pinned to
      # cosign v2.4.1; checksums are from that release's cosign_checksums.txt.
      - name: Install cosign (SHA-pinned)
        run: |
          set -euo pipefail
          COSIGN_VERSION="2.4.1"
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)   ASSET="cosign-linux-amd64";  SHA="8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b" ;;
            macOS-X64)   ASSET="cosign-darwin-amd64"; SHA="666032ca283da92b6f7953965688fd51200fdc891a86c19e05c98b898ea0af4e" ;;
            macOS-ARM64) ASSET="cosign-darwin-arm64"; SHA="13343856b69f70388c4fe0b986a31dde5958e444b41be22d785d3dc5e1a9cc62" ;;
            *) echo "::error::unsupported runner ${{ runner.os }}-${{ runner.arch }} for cosign"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/${ASSET}" -o /tmp/cosign
          echo "${SHA}  /tmp/cosign" | shasum -a 256 -c -
          chmod +x /tmp/cosign
          sudo mv /tmp/cosign /usr/local/bin/cosign
          cosign version

      # Keyless signing: GitHub Actions presents its OIDC identity to Fulcio,
      # which issues a short-lived signing certificate. No signing secret. We
      # immediately verify the result against this repo's workflow identity so a
      # broken signature fails the release here rather than at upgrade time.
      - name: Sign + verify artifact (cosign keyless)
        run: |
          set -euo pipefail
          ASSET="pgbattery-${{ matrix.os_name }}-${{ matrix.arch }}"
          # SHA-256 (integrity); kept alongside the cosign material.
          shasum -a 256 "dist/$ASSET" | awk '{print $1}' > "dist/$ASSET.sha256"
          cosign sign-blob --yes \
            --output-signature "dist/$ASSET.sig" \
            --output-certificate "dist/$ASSET.pem" \
            "dist/$ASSET"
          cosign verify-blob \
            --signature "dist/$ASSET.sig" \
            --certificate "dist/$ASSET.pem" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/release\.yml@refs/tags/v.*$" \
            "dist/$ASSET"
          echo "Signed + verified: $ASSET"
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET="pgbattery-${{ matrix.os_name }}-${{ matrix.arch }}"
          gh release upload "$GITHUB_REF_NAME" \
            "dist/$ASSET" \
            "dist/$ASSET.sha256" \
            "dist/$ASSET.sig" \
            "dist/$ASSET.pem" --clobber
