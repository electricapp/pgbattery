name: CLA Assistant

# Gate pull requests on a signed Contributor License Agreement (see
# docs/legal/ICLA.md / docs/legal/CCLA.md and CONTRIBUTING.md). The Project is
# dual-licensed (AGPL-3.0-only + commercial), so every external contribution
# must carry a CLA that grants the Maintainer the right to relicense it — a DCO
# would not be sufficient. Signatures are recorded by the contributor commenting
# the sign phrase on their PR; the bot stores them in a JSON file on a dedicated
# branch of this repo.
#
# pull_request_target (not pull_request) is required so the job runs with repo
# write permissions to comment and record signatures. This action does NOT check
# out or execute the PR's code, so running on pull_request_target is safe here.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Deny-all by default; the single job below re-grants the scopes the CLA
# assistant needs for the default GITHUB_TOKEN. Signature storage uses the
# separate PERSONAL_ACCESS_TOKEN secret (see below).
permissions: {}

concurrency:
  group: cla-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  cla-assistant:
    name: Check / record CLA signature
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Least privilege for the default GITHUB_TOKEN — the CLA assistant comments
    # on the PR, sets a commit status, and records signatures.
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    # Only act on the sign/recheck comment, or on PR lifecycle events.
    if: >-
      (github.event.issue.pull_request &&
        (github.event.comment.body == 'recheck' ||
         github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
      || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        # Pinned to v2.6.1 (released 2024-09-26) per org policy (SHA-pinned,
        # >7 days old). Re-pin deliberately when bumping.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          # Provided automatically by Actions; used to comment on the PR and set status.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT (classic: `repo` scope, or fine-grained: Contents read/write on
          # this repo) used to commit the signatures file to the storage branch.
          # Create it under repo Settings → Secrets and variables → Actions as
          # CLA_SIGNATURES_TOKEN.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          # Where signatures are recorded (auto-created on first signature).
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'cla-signatures'
          # The agreement contributors are signing.
          path-to-document: 'https://github.com/electricapp/pgbattery/blob/main/docs/legal/ICLA.md'
          # Exact phrase a contributor must comment to sign.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >-
            Thank you for your pull request! Before we can merge it, we need you
            to sign our [Contributor License Agreement](https://github.com/electricapp/pgbattery/blob/main/docs/legal/ICLA.md).
            If you are contributing on behalf of a company, see the
            [Corporate CLA](https://github.com/electricapp/pgbattery/blob/main/docs/legal/CCLA.md).
            To sign, post a comment on this PR with exactly:
          custom-allsigned-prcomment: '✅ All contributors have signed the CLA. Thank you!'
          # Accounts that never need to sign (maintainer + bots).
          allowlist: 'electricapp,dependabot[bot],dependabot-preview[bot],*[bot]'
          # Re-check on new commits so added co-authors are caught.
          lock-pullrequest-aftermerge: false
