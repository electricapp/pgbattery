name: Prettier

# Markdown formatting is enforced HERE — and only here. The build/test workflows
# (ci, ha-ci, elle, fuzz, tla) ignore *.md, so docs-only changes run just this
# cheap check. Prettier is pinned to a fixed version so local and CI agree.
on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".prettierrc.json"
      - ".prettierignore"
      - ".github/workflows/prettier.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".prettierrc.json"
      - ".prettierignore"
      - ".github/workflows/prettier.yml"
  workflow_dispatch:

concurrency:
  group: prettier-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Deny-all by default; each job re-grants only the scopes it needs.
permissions: {}

jobs:
  prettier:
    name: Check Markdown formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Check **/*.md with Prettier
        run: npx --yes prettier@3.8.4 --check "**/*.md"
