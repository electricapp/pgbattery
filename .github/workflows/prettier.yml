name: Prettier

# Markdown formatting is enforced HERE — and only here. The build/test workflows
# (ci, ha-ci, elle, fuzz, tla) ignore *.md, so docs-only changes run just this
# cheap check. Prettier is pinned to a fixed version so local and CI agree.
on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".prettierrc.json"
      - ".prettierignore"
      - ".github/workflows/prettier.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".prettierrc.json"
      - ".prettierignore"
      - ".github/workflows/prettier.yml"
  workflow_dispatch:

concurrency:
  group: prettier-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  prettier:
    name: Check Markdown formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Check **/*.md with Prettier
        run: npx --yes prettier@3.8.4 --check "**/*.md"
