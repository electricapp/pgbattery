name: TLA+

# Machine-checks the formal specs in tla/. Reproducible: the model checker
# (tla2tools.jar) is pinned by version + SHA-256 in tla/Makefile, and CI runs
# the very same `make -C tla check` you run locally.

on:
  push:
    paths:
      - "tla/**"
      - "!tla/**/*.md" # docs never trigger model checking
      - ".github/workflows/tla.yml"
  pull_request:
    paths:
      - "tla/**"
      - "!tla/**/*.md" # docs never trigger model checking
      - ".github/workflows/tla.yml"
  workflow_dispatch:

# Deny-all by default; each job re-grants only the scopes it needs.
permissions: {}

concurrency:
  group: tla-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  tlc:
    name: Model-check TLA+ specs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Model-check all specs (downloads + verifies pinned TLC jar)
        run: make -C tla check
