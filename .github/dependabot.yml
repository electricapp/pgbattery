version: 2
updates:
  # Rust dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "deps(rust)"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "rust"
    groups:
      cargo:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"

  # GitHub Actions workflows — Dependabot bumps both the SHA pin and the
  # trailing version comment.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "deps(actions)"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "actions"
    groups:
      actions:
        patterns:
          - "*"

  # Docker base image(s) for the container build.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "deps(docker)"
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker:
        patterns:
          - "*"
